<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интерактивный План Участка</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Snap.svg Local -->
  <script src="snap.svg-min.js"></script>
  <!-- App JS -->
  <script src="app.js" defer></script>
</head>
<body class="dark-theme">
  <div class="app-container">
    <main class="app-body-full">
      <!-- Fullscreen SVG Canvas Container -->
      <div class="canvas-container" id="canvas-container">
        <!-- SVG will be loaded/injected here via Snap.svg -->
        <svg id="svg-canvas" width="100%" height="100%"></svg>
        
        <!-- Floating Toolbar on Map -->
        <div class="map-toolbar-floating">
          <button id="btn-zoom-in" class="btn-tool" title="Приблизить"><i class="fa-solid fa-magnifying-glass-plus"></i></button>
          <button id="btn-zoom-out" class="btn-tool" title="Отдалить"><i class="fa-solid fa-magnifying-glass-minus"></i></button>
          <button id="btn-reset" class="btn-tool" title="Сбросить вид"><i class="fa-solid fa-arrows-to-dot"></i></button>
          <div class="divider"></div>
          <button id="theme-toggle" class="btn-tool" title="Переключить тему"><i class="fa-solid fa-moon"></i></button>
        </div>
      </div>
      
      <!-- Legend strictly below the plan at the bottom -->
      <div class="plan-legend-below">
        <div class="legend-item">
          <span class="legend-color residential"></span>
          <div class="legend-text">
            <strong>Жилая зона (HOUSE)</strong>
            <span>Проектируемый двухэтажный жилой дом</span>
          </div>
        </div>
        <div class="legend-item">
          <span class="legend-color garden"></span>
          <div class="legend-text">
            <strong>Сад / Огород</strong>
            <span>Свободная территория под озеленение</span>
          </div>
        </div>
        <div class="legend-item">
          <span class="legend-color utility"></span>
          <div class="legend-text">
            <strong>Хоз. постройки (PARKING)</strong>
            <span>Парковочная зона на 2-3 авто</span>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>

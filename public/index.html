<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Garden — Interactive Site Plan</title>
  <!-- Google Fonts: Syne (Ultra-modern Display) & Outfit (Geometric Body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
  <!-- Snap.svg Local -->
  <script src="snap.svg-min.js"></script>
  <!-- App JS -->
  <script src="app.js" defer></script>
</head>
<body class="dark-theme">
  <div class="app-container">
    <main class="app-body-full">
      <!-- Fullscreen SVG Canvas Container -->
      <div class="canvas-container" id="canvas-container">
        <!-- SVG will be loaded/injected here via Snap.svg -->
        <svg id="svg-canvas" width="100%" height="100%"></svg>
        
        <!-- Premium Floating HUD Title -->
        <div class="map-title-floating">
          <div class="hud-title-wrapper">
            <span class="hud-scanner-line"></span>
            <i class="fa-solid fa-leaf title-leaf-icon"></i>
            <h1>HIDDEN GARDEN</h1>
          </div>
        </div>

        <!-- Floating Toolbar on the Right -->
        <div class="map-toolbar-floating">
          <button id="btn-zoom-in" class="btn-tool" title="Zoom In"><i class="fa-solid fa-plus"></i></button>
          <button id="btn-zoom-out" class="btn-tool" title="Zoom Out"><i class="fa-solid fa-minus"></i></button>
          <button id="btn-reset" class="btn-tool" title="Reset View"><i class="fa-solid fa-expand"></i></button>
          <div class="divider"></div>
          <button id="theme-toggle" class="btn-tool" title="Toggle Theme"><i class="fa-solid fa-circle-half-stroke"></i></button>
        </div>

        <!-- Premium Floating Glassmorphic Legend on the Left -->
        <div class="plan-legend-floating">
          <div class="legend-header">
            <h3>MAP LEGEND</h3>
          </div>
          <div class="legend-items">
            <div class="legend-item" data-target="main-house">
              <div class="legend-color-wrapper">
                <span class="legend-color residential"></span>
              </div>
              <div class="legend-text">
                <strong>Residential (HOUSE)</strong>
                <span>Main House • 160 m²</span>
              </div>
            </div>
            <div class="legend-item" data-target="garden">
              <div class="legend-color-wrapper">
                <span class="legend-color garden"></span>
              </div>
              <div class="legend-text">
                <strong>Garden / Green Space</strong>
                <span>Landscaping • 480 m²</span>
              </div>
            </div>
            <div class="legend-item" data-target="parking">
              <div class="legend-color-wrapper">
                <span class="legend-color utility"></span>
              </div>
              <div class="legend-text">
                <strong>Utility (PARKING)</strong>
                <span>Parking Area • 72 m²</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
